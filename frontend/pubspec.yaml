name: icms
description: Interior Company Management System - Flutter client (Material 3, Riverpod, GoRouter).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_riverpod: ^2.5.1
  # Navigation
  go_router: ^14.2.0
  # Networking
  dio: ^5.5.0
  # Secure token storage
  flutter_secure_storage: ^9.2.2
  # Offline cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # File / media handling
  file_picker: ^8.0.6
  image_picker: ^1.1.2
  # PDF viewing (drawings)
  syncfusion_flutter_core: ^33.2.13
  syncfusion_flutter_pdf: ^33.2.13
  syncfusion_flutter_pdfviewer: ^33.2.13
  syncfusion_flutter_signaturepad: ^33.2.13
  # Local file paths for offline downloads
  path_provider: ^2.1.3
  # Formatting
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  # Firebase push notifications
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1
  # Media viewers + recording
  photo_view: ^0.15.0
  video_player: ^2.9.2
  chewie: ^1.8.5
  just_audio: ^0.9.40
  record: ^5.1.2
  # UI utilities
  shimmer: ^3.0.0
  flutter_keyboard_visibility: ^5.4.1
  connectivity_plus: ^6.1.1
  percent_indicator: ^4.2.3
  url_launcher: ^6.3.1
  cached_network_image: ^3.4.1
  flutter_staggered_animations: ^1.1.1
  wakelock_plus: ^1.2.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
