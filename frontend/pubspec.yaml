name: icms
description: Interior Company Management System - Flutter client (Material 3, Riverpod, GoRouter).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_riverpod: ^2.5.1
  # Navigation
  go_router: ^14.2.0
  # Networking
  dio: ^5.5.0
  # Secure token storage
  flutter_secure_storage: ^9.2.2
  # Offline cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # File / media handling
  file_picker: ^10.3.3
  image_picker: ^1.1.2
  # PDF viewing (drawings)
  syncfusion_flutter_core: ^33.2.13
  syncfusion_flutter_pdf: ^33.2.13
  syncfusion_flutter_pdfviewer: ^33.2.13
  syncfusion_flutter_signaturepad: ^33.2.13
  # Local file paths for offline downloads
  path_provider: ^2.1.3
  # Formatting
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
