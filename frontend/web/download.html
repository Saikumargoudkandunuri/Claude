<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download - Metal & More Interiors</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f5f7fa 0%, #e8f7f8 100%);
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 400px;
      width: 100%;
      background: #ffffff;
      border-radius: 20px;
      padding: 48px 32px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
    }
    .app-icon {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 15px;
      color: #666;
      margin-bottom: 36px;
      line-height: 1.5;
    }
    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #00D1DC;
      color: #ffffff;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      transition: background 0.2s, transform 0.1s;
    }
    .download-btn:hover {
      background: #00b8c2;
      transform: translateY(-1px);
    }
    .download-btn:active {
      transform: translateY(0);
    }
    .download-btn svg {
      width: 20px;
      height: 20px;
    }
    .note {
      margin-top: 24px;
      font-size: 13px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="icons/Icon-192.png" alt="Metal & More Interiors" class="app-icon">
    <h1>Metal & More Interiors</h1>
    <p class="subtitle">Track your interior project progress, view photos, timeline, and payments — all in one place.</p>
    <a href="/app-release.apk" class="download-btn">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5m0 0l5-5m-5 5V3"/>
      </svg>
      Download for Android
    </a>
    <p class="note">Requires Android 6.0 or later</p>
  </div>
</body>
</html>
