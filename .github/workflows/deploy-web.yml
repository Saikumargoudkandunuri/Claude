name: Deploy Customer Portal (Web) to Hostinger

# Builds the Flutter web app and syncs it to the Hostinger subdomain
# (client.metalandmore.in) over SSH/rsync. Runs on every push to main,
# and can also be triggered manually from the Actions tab.
#
# Requires SSH to be ENABLED in hPanel and an SSH *key* added there.
# Configure these GitHub repository secrets/variables:
#   Secrets:
#     HOSTINGER_SSH_HOST   e.g. 82.112.239.151
#     HOSTINGER_SSH_PORT   e.g. 65002
#     HOSTINGER_SSH_USER   e.g. u235894942
#     HOSTINGER_SSH_KEY_B64  base64 of the PRIVATE key (avoids newline mangling);
#                            generate with: base64 -w0 ~/.ssh/key  (Linux/mac) or
#                            [Convert]::ToBase64String([IO.File]::ReadAllBytes("key")) (PowerShell)
#   Variables:
#     HOSTINGER_WEB_DIR    absolute path of the client subdomain doc root,
#                          e.g. /home/u235894942/domains/client.metalandmore.in/public_html/
#                          (must end with a trailing slash)

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (release)
        run: >
          flutter build web --release
          --dart-define=API_BASE_URL=https://api.metalandmore.in/api/v1

      # The .htaccess and download.html in frontend/web/ are copied into
      # build/web automatically by `flutter build web`.

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Best-effort known_hosts population; never fail the step on it.
          ssh-keyscan -p "${{ secrets.HOSTINGER_SSH_PORT }}" "${{ secrets.HOSTINGER_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy via rsync over SSH
        run: |
          rsync -avz --delete \
            --exclude 'app-release.apk' \
            -e "ssh -p ${{ secrets.HOSTINGER_SSH_PORT }} -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            build/web/ \
            "${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }}:${{ vars.HOSTINGER_WEB_DIR }}"
